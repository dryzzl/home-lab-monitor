<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Home Lab Monitor</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Home Lab Monitor</h1>

    <div class="card">
        <h2>CPU</h2>

        <div class="metric-value" id="cpu-percent"></div>

        <div class="progress-container">
            <div class="progress-bar" id="cpu-bar"></div>
        </div>
    </div>

    <div class="card">
        <h2>Memory</h2>

        <div class="metric-value" id="memory-percent"></div>

        <div class="progress-container">
            <div class="progress-bar" id="memory-bar"></div>
        </div>
    </div>

    <div class="card">
        <h2>Disk</h2>

        <div class="metric-value" id="disk-percent"></div>

        <div class="progress-container">
            <div class="progress-bar" id="disk-bar"></div>
        </div>
    </div>

    <script src="app.js"></script>

</body>

</html>
